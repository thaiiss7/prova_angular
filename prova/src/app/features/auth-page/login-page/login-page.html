<div class="login-page">
    <div class="form-container">
        <header>
            <h1>Login</h1>
        </header>
        <form action="get" (ngSubmit)="login()">
            <app-input-component
                [label]="'email'"
            ></app-input-component>
            <app-input-component
                [label]="'password'"
            ></app-input-component>
            <app-button
                [title]="'Login'"
            ></app-button>
        </form>
    </div>
</div>
